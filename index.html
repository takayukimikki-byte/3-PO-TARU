<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3年ポータルサイト</title>
    <style>
        /* --- CSS設定 --- */
        body { font-family: sans-serif; margin: 0; padding: 20px; background-color: #f0f2f5; }
        .header-container { margin-bottom: 20px; }
        h1 { color: #505050; padding: 0.5em 1em; display: inline-block; background: #dbebf8; border-radius: 25px 0px 0px 25px; font-size: 1.2rem; margin: 0; }
        h1:before { content: '●'; color: white; margin-right: 8px; }
        .card { background: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { color: #00b900; font-size: 1.1rem; margin-top: 0; }

        /* 天気予報のデザイン（横並び） */
        .weather-row { display: flex; justify-content: space-around; background: linear-gradient(135deg, #e0f2fe 0%, #ffffff 100%); border: 1px solid #bae6fd; padding: 10px; }
        .weather-item { text-align: center; flex: 1; }
        .weather-label { font-size: 0.7rem; color: #64748b; font-weight: bold; }
        .weather-icon { font-size: 1.8rem; margin: 5px 0; }
        .weather-temp { font-size: 0.9rem; font-weight: bold; color: #334155; }

        /* 時間割テーブル */
        table { border-collapse: separate; border-spacing: 5px; width: 100%; }
        table td { border-radius: 5px; text-align: center; padding: 10px 0; background-color: #e4d4bc; border: solid 1px #af9d85; color: #5d4a31; font-weight: bold; }
        .period-label { font-size: 0.7em; display: block; color: #8e7d66; }

        /* 予定・持ち物の余白設定 */
        .info-row { margin-bottom: 20px; font-size: 0.9em; }
        .info-label { font-weight: bold; color: #555; display: block; margin-bottom: 5px; }
        .info-content { padding-left: 10px; color: #333; white-space: pre-wrap; }

        /* カウントダウン */
        .cd-box { background: white; border-radius: 15px; padding: 15px; margin-bottom: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-left: 8px solid; }
        .main-event { border-left-color: #ff9f43; background: linear-gradient(to right, #ffffff, #fff5e6); }
        .main-event .cd-days { font-size: 2.5rem; color: #ff9f43; }
        .test-container { display: flex; gap: 10px; margin-bottom: 20px; }
        .test-container .cd-box { flex: 1; padding: 10px 5px; margin-bottom: 0; }
        .unit-test { border-left-color: #48dbfb; }
        .term-test { border-left-color: #ff9ff3; }
        .exam-test { border-left-color: #ee5253; }
        .cd-label { font-size: 0.8rem; font-weight: bold; color: #666; }
        .cd-days { font-size: 1.5rem; font-weight: bold; }

        /* --- タブのスタイル --- */
        .tab-container {
            display: flex;
            justify-content: space-around;
            background: #fff;
            border-radius: 10px 10px 0 0;
            overflow: hidden;
            margin-bottom: 0;
        }
        .tab-item {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            background: #e0e0e0;
            color: #666;
            font-weight: bold;
            transition: 0.3s;
            border-bottom: 3px solid transparent;
        }
        .tab-item.active {
            background: #fff;
            color: #00b900;
            border-bottom: 3px solid #00b900;
        }

        /* カードの角丸を調整（タブとつなげるため） */
        .card.timetable-card {
            border-top-left-radius: 0;
            border-top-right-radius: 0;
        }

        /* エラー・デバッグ表示 */
        #debug-info {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 15px;
            font-size: 0.8rem;
            color: #856404;
            display: none;
        }

        /* 共通情報のスタイル */
        .common-info {
            border-left: 4px solid #00b900;
            background: #f0f8f0;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
        }
        .common-date {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 5px;
        }

        /* 受験対策問題のスタイル */
        .exam-question {
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .exam-question-header {
            background: #e3f2fd;
            padding: 15px;
            border-bottom: 1px solid #ddd;
        }
        .exam-difficulty {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-left: 10px;
        }
        .exam-difficulty-easy { background: #90EE90; color: #333; }
        .exam-difficulty-medium { background: #FFD700; color: #333; }
        .exam-difficulty-hard { background: #FF6B6B; color: white; }
        .exam-question-text { margin: 0; color: #333; font-weight: 500; }
        .exam-question-body {
            padding: 15px;
        }
        .exam-answer-button {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
        }
        .exam-answer-button:hover {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        }
        .exam-answer {
            background: #f0f8f0;
            padding: 15px;
            border-left: 4px solid #00b900;
            border-radius: 6px;
            color: #333;
        }

        /* 非表示セクション */
        .hidden-section {
            display: none;
        }
    </style>
</head>
<body>
    <div class="header-container">
        <h1>3学年 予定・行事</h1>
    </div>

    <div class="cd-box main-event">
        <div class="cd-label">🚌 修学旅行まで</div>
        <div class="cd-days"><span id="days-trip">--</span> 日</div>
    </div>
    <div class="test-container">
        <div class="cd-box unit-test"><div class="cd-label">📝 学力テスト</div><div class="cd-days"><span id="days-unit">--</span>日</div></div>
        <div class="cd-box term-test"><div class="cd-label">✍️ 期末テスト</div><div class="cd-days"><span id="days-term">--</span>日</div></div>
        <div class="cd-box exam-test"><div class="cd-label">🔥 受験　2月15日の場合</div><div class="cd-days"><span id="days-exam">--</span>日</div></div>
    </div>

    <!-- デバッグ情報（問題発生時に表示） -->
    <div id="debug-info"></div>

    <!-- ★ 共通情報セクション（カウントダウンの下） -->
    <div class="card" id="common-section">
        <h2>📢 学年連絡事項</h2>
        <div id="common-container">
            <p>読み込み中...</p>
        </div>
    </div>

    <!-- ★ クラス別タブ（1組、2組、3組のみ） -->
    <div class="tab-container">
        <div class="tab-item active" onclick="switchClass('1組')">1組</div>
        <div class="tab-item" onclick="switchClass('2組')">2組</div>
        <div class="tab-item" onclick="switchClass('3組')">3組</div>
    </div>

    <div class="card timetable-card">
        <h2 id="timetable-title">予定を確認中... 📅</h2>
        <div id="timetable-container">
            <p>読み込み中...</p>
        </div>
        <div id="other-info" style="margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px;">
            準備中...
        </div>
    </div>

    <div class="weather-row card">
        <div class="weather-item">
            <div class="weather-label">朝 (9:00)</div>
            <div class="weather-icon" id="icon-morning">--</div>
            <div class="weather-temp"><span id="temp-morning">--</span>℃</div>
        </div>
        <div class="weather-item">
            <div class="weather-label">昼 (15:00)</div>
            <div class="weather-icon" id="icon-noon">--</div>
            <div class="weather-temp"><span id="temp-noon">--</span>℃</div>
        </div>
        <div class="weather-item">
            <div class="weather-label">晩 (21:00)</div>
            <div class="weather-icon" id="icon-evening">--</div>
            <div class="weather-temp"><span id="temp-evening">--</span>℃</div>
        </div>
    </div>

    <!-- ★ 受験対策セクション（クラス別タブの下） -->
    <div class="card" id="exam-section">
        <h2>📚 受験対策問題集</h2>
        <div id="exam-container">
            <p>読み込み中...</p>
        </div>
    </div>

<script>
    // --- 設定エリア ---
    let currentClass = "1組";
    let allData = {
        classData: [],
        commonData: [],
        examData: []
    };
    const GAS_URL = "https://script.google.com/macros/s/AKfycby4BzPOZeZjh34Ag5eXS6jDyb6p_SOrRSJAN5kSx-08Llueki8klNN1pbLwsY9bB1KRGg/exec";

    // デバッグ情報を表示する関数
    function showDebug(msg) {
        const el = document.getElementById('debug-info');
        el.style.display = 'block';
        el.innerHTML = '⚠️ ' + msg;
        console.warn(msg);
    }

    function updateCountdown(id, targetStr) {
        const element = document.getElementById(id);
        if (!element) return;
        const target = new Date(targetStr);
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        target.setHours(0, 0, 0, 0);
        const diffDays = Math.ceil((target - today) / (1000 * 60 * 60 * 24));
        element.innerText = diffDays >= 0 ? diffDays : "終了";
    }

    function switchClass(className) {
        currentClass = className;
        const tabs = document.querySelectorAll('.tab-item');
        tabs.forEach(tab => {
            tab.classList.toggle('active', tab.innerText === className);
        });
        renderContent();
    }

    // 共通情報を表示する関数
    function renderCommonInfo() {
        if (!allData.commonData || allData.commonData.length === 0) {
            document.getElementById('common-container').innerHTML = "<p>共通の連絡事項はありません</p>";
            return;
        }

        let html = "";
        allData.commonData.forEach(item => {
            html += `
                <div class="common-info">
                    <div class="common-date">${item.date || ""} ${item.status ? "[" + item.status + "]" : ""}</div>
                    ${item.items ? `<div class="info-row"><span class="info-label">🎒 持ち物:</span><div class="info-content">${item.items}</div></div>` : ""}
                    ${item.event ? `<div class="info-row"><span class="info-label">🚩 行事:</span><div class="info-content">${item.event}</div></div>` : ""}
                    ${item.memo ? `<div class="info-row"><span class="info-label">📝 備考:</span><div class="info-content">${item.memo}</div></div>` : ""}
                </div>
            `;
        });
        document.getElementById('common-container').innerHTML = html;
    }

    // 受験対策問題を表示する関数
    function renderExamQuestions() {
        if (!allData.examData || allData.examData.length === 0) {
            document.getElementById('exam-container').innerHTML = "<p>受験対策問題がありません</p>";
            return;
        }

        let html = "";
        allData.examData.forEach((item, idx) => {
            const answerId = "answer-" + idx;
            let difficultyClass = "";
            if (item.difficulty === "易") difficultyClass = "exam-difficulty-easy";
            else if (item.difficulty === "中") difficultyClass = "exam-difficulty-medium";
            else if (item.difficulty === "難") difficultyClass = "exam-difficulty-hard";
            
            html += `
                <div class="exam-question">
                    <div class="exam-question-header">
                        <span style="font-weight: bold; color: #1976d2;">${item.subject || "問題"}</span>
                        ${item.difficulty ? `<span class="exam-difficulty ${difficultyClass}">${item.difficulty}</span>` : ""}
                        <p class="exam-question-text">${item.question || ""}</p>
                    </div>
                    <div class="exam-question-body">
                        <div id="${answerId}" style="display: block;">
                            <button onclick="revealAnswer('${answerId}')" class="exam-answer-button">
                                ▼ 答えを表示
                            </button>
                        </div>
                    </div>
                </div>
            `;
        });
        document.getElementById('exam-container').innerHTML = html;
    }

    // 答えを表示する関数
    function revealAnswer(answerId) {
        const idx = parseInt(answerId.replace("answer-", ""));
        const item = allData.examData[idx];
        const container = document.getElementById(answerId);
        
        container.innerHTML = `
            <div class="exam-answer">
                <p style="margin: 0;">${item.answer || ""}</p>
            </div>
        `;
    }

    function renderContent() {
        if (!allData.classData || allData.classData.length === 0) {
            document.getElementById('timetable-container').innerHTML =
                "<p>⚠️ スプレッドシートにデータがありません。GASのスプレッドシートにデータを入力してください。</p>";
            document.getElementById('other-info').innerHTML = "";
            return;
        }

        const now = new Date();
        const hour = now.getHours();
        const dayOfWeek = now.getDay();
        let targetDate = new Date(now);

        // 12時を過ぎたら翌日（金曜なら月曜）の予定を出す
        if (hour >= 12) {
            if (dayOfWeek === 5) targetDate.setDate(now.getDate() + 3);
            else if (dayOfWeek === 6) targetDate.setDate(now.getDate() + 2);
            else targetDate.setDate(now.getDate() + 1);
        } else {
            if (dayOfWeek === 6) targetDate.setDate(now.getDate() + 2);
            else if (dayOfWeek === 0) targetDate.setDate(now.getDate() + 1);
        }

        const y = targetDate.getFullYear();
        const m = ("0" + (targetDate.getMonth() + 1)).slice(-2);
        const d = ("0" + targetDate.getDate()).slice(-2);

        const targetStr_slash  = `${y}/${m}/${d}`;
        const targetStr_hyphen = `${y}-${m}-${d}`;
        const targetStr_jp     = `${y}年${m}月${d}日`;

        document.getElementById('timetable-title').innerText =
            `${targetDate.getMonth() + 1}月${targetDate.getDate()}日（${["日","月","火","水","木","金","土"][targetDate.getDay()]}曜日）📅`;

        const targetData = allData.classData.find(row => {
            const rowDate = String(row.date || row.日付 || "").trim();
            const rowClass = String(row.組 || row.class || row.クラス || "").trim();
            const dateMatch =
                rowDate === targetStr_slash  ||
                rowDate === targetStr_hyphen ||
                rowDate === targetStr_jp     ||
                rowDate === `${y}/${Number(m)}/${Number(d)}`;
            return dateMatch && rowClass === currentClass;
        });

        if (targetData) {
            // 天気
            document.getElementById('icon-morning').innerText  = targetData.weather_morning || "--";
            document.getElementById('icon-noon').innerText     = targetData.weather_noon    || "--";
            document.getElementById('icon-evening').innerText  = targetData.weather_evening || "--";
            document.getElementById('temp-morning').innerText  = targetData.temp_morning    || "--";
            document.getElementById('temp-noon').innerText     = targetData.temp_noon       || "--";
            document.getElementById('temp-evening').innerText  = targetData.temp_evening    || "--";

            // 時間割
            document.getElementById('timetable-container').innerHTML = `
                <table>
                    <tr>
                        <td><span class="period-label">1</span>${targetData.p1 || 'ー'}</td>
                        <td><span class="period-label">2</span>${targetData.p2 || 'ー'}</td>
                        <td><span class="period-label">3</span>${targetData.p3 || 'ー'}</td>
                    </tr>
                    <tr>
                        <td><span class="period-label">4</span>${targetData.p4 || 'ー'}</td>
                        <td><span class="period-label">5</span>${targetData.p5 || 'ー'}</td>
                        <td><span class="period-label">6</span>${targetData.p6 || 'ー'}</td>
                    </tr>
                </table>`;

            // 共通情報
            document.getElementById('other-info').innerHTML = `
                <div class="info-row"><span class="info-label">🎒 持ち物:</span><div class="info-content">${targetData.items || 'なし'}</div></div>
                <div class="info-row"><span class="info-label">🚩 行事:</span><div class="info-content">${targetData.event || 'なし'}</div></div>
                <div class="info-row"><span class="info-label">📝 備考:</span><div class="info-content">${targetData.memo || '特になし'}</div></div>`;
        } else {
            const availableDates = [...new Set(allData.classData.map(r => String(r.date || r.日付 || "").trim()))].join(", ");
            const availableClasses = [...new Set(allData.classData.map(r => String(r.組 || r.class || "").trim()))].join(", ");
            document.getElementById('timetable-container').innerHTML =
                `<p>${targetStr_slash} の ${currentClass} のデータが見つかりません</p>`;
            showDebug(
                `検索日: ${targetStr_slash} ／ 組: ${currentClass}<br>` +
                `スプレッドシートにある日付: ${availableDates || "(なし)"}<br>` +
                `スプレッドシートにある組: ${availableClasses || "(なし)"}`
            );
        }
    }

    async function loadData() {
        try {
            updateCountdown('days-trip', '2026/06/17');
            updateCountdown('days-unit', '2026/05/07');
            updateCountdown('days-term', '2026/06/23');
            updateCountdown('days-exam', '2027/02/15');

            const response = await fetch(GAS_URL, {
                method: 'GET',
                redirect: 'follow',
                mode: 'cors',
                cache: 'no-cache'
            });

            if (!response.ok) throw new Error(`HTTPエラー: ${response.status}`);

            const text = await response.text();
            console.log("Raw Text:", text);

            let parsed;
            try {
                parsed = JSON.parse(text);
            } catch (e1) {
                const match = text.match(/[\[\{][\s\S]*[\]\}]/);
                if (match) {
                    try {
                        parsed = JSON.parse(match[0]);
                    } catch (e2) {
                        throw new Error("JSONパース失敗: " + e2.message);
                    }
                } else {
                    throw new Error("レスポンスがJSON形式ではありません");
                }
            }

            // 新しいレスポンス形式に対応
            if (parsed.classData && parsed.commonData && parsed.examData) {
                allData = parsed;
            } else if (Array.isArray(parsed)) {
                allData = { classData: parsed, commonData: [], examData: [] };
            } else {
                allData = { classData: [], commonData: [], examData: [] };
            }

            console.log("Loaded Data:", allData);
            renderCommonInfo();
            renderExamQuestions();
            renderContent();

        } catch (error) {
            console.error("Fetch Error:", error);
            document.getElementById('timetable-container').innerHTML =
                `<p>❌ データの取得に失敗しました。<br><small>${error.message}</small></p>`;
            showDebug("取得エラー: " + error.message + "<br>GASのデプロイ設定（アクセス権限: 全員）を確認してください。");
        }
    }

    window.onload = loadData;
</script>
</body>
</html>
